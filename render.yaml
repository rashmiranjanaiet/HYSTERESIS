services:
  - type: web
    name: hysteresis
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: hysteresis_auth
      - key: JWT_SECRET
        sync: false
